    data:
      heading: Faites créer votre voyage au Vietnam en 3 étapes !
      subheading: 'Votre voyage au Vietnam sur mesure : nos conseillers le façonnent selon vos préférences !'
      items:
        - number: 1
          title: Premier contact
          description: >-
            Vous laissez vos coordonnées et notre conseiller de voyage vous appelera. Partagez-leur vos envies pour ce
            voyage au Vietnam. N’hésitez pas à leur poser des questions concernant vos incertitudes, vos préoccupations.
          icon: https://aucoeurvietnam.com/wp-content/uploads/2023/12/etape-1.png
        - number: 2
          title: Personnalisation
          description: >-
            Une fois que vous avez reçu le premier devis, poursuivez les échanges avec votre conseiller de voyage afin
            de le personnaliser en fonction de vos préférences, jusqu’à ce qu’il corresponde bien à vos attentes.
          icon: https://aucoeurvietnam.com/wp-content/uploads/2023/12/etape-2.png
        - number: 3
          title: Voyage
          description: >-
            Une fois sur place, nous vous offrons une assistance 24/7, travaillant en étroite collaboration avec nos
            partenaires locaux pour assurer la flexibilité totale, l’authenticité et l’immersion complète de votre
            voyage.
          icon: https://aucoeurvietnam.com/wp-content/uploads/2023/12/etape-3.png
      variant: numbered
    style:
      padding: 4rem 2rem
