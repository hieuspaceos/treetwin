  - type: rich-text
    order: 1
    enabled: true
    data:
      subtitle: 'AucoeurVietnam : Pionnier du tourisme responsable, pour un avenir durable'
      content: >-
        Conscient des enjeux écologiques et sociétaux, AucoeurVietnam met en place des solutions pour contrebalancer son
        empreinte et celle de ses voyages mais aussi encourager la transition vers un tourisme durable. Cela se
        manifeste par la signature de la charte Travelife 2017 et le rôle d’initiateur de WAFORT, la communauté du
        tourisme responsable au Vietnam. En parallèle, nous effectuons des actions concrètes telles que la restauration
        d’un orphelinat, des journées de ramassage de déchets, la plantation dans les provinces, la promotion des
        déplacements verts, et surtout l’organisation de voyages responsables respectueux de l’environnement, des
        populations et de l’économie locales.
      image:
        url: https://aucoeurvietnam.com/wp-content/uploads/2023/12/Travelife-300x117.webp
        alt: travel life
      cta:
        - text: Découvrir plus sur nos actions
          url: https://aucoeurvietnam.com/parcours-de-tourisme-responsable/
      heading: Nos engagements responsables et actions solidaires
