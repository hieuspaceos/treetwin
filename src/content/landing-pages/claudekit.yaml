scopedCss:
  - selector: .landing-page-root
    css: |-
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
      .landing-btn-primary { background: var(--lp-accent, var(--lp-primary)); border-radius: 25px; }
  - selector: '[data-section="section-hero"]'
    css: 'h1, h2 { font-size: clamp(2.5rem, 5vw, 3.5rem); color: #fff; }'
  - selector: '[data-section="section-nav"]'
    css: >-
      .landing-section { background: rgba(14,14,14,0.8); } h1, h2, h3, h4 { color: #ffffff; } p, li, span { color:
      #cccccc; } .lp-card-hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); } .glass-card
      { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: #ffffff; } .lp-icon-bg {
      background: rgba(255,255,255,0.1); }
  - selector: '[data-section="section-hero"]'
    css: '.landing-section { background: linear-gradient(to bottom right, rgba(217,119,87,0.05), rgba(212,162,127,0.03)); }'
  - selector: '[data-section="section-features"]'
    css: >-
      .landing-section { background: #1A1A1A; } h1, h2, h3, h4, h5 { color: #fff; } p, li, span, a { color:
      rgba(255,255,255,0.8); }
  - selector: '[data-section="section-stats"]'
    css: >-
      .landing-section { background: #0E0E0E; } h1, h2, h3, h4, h5 { color: #fff; } p, li, span, a { color:
      rgba(255,255,255,0.8); }
  - selector: '[data-section="section-pricing"]'
    css: >-
      .landing-section { background: #0E0E0E; } h1, h2, h3, h4, h5 { color: #fff; } p, li, span, a { color:
      rgba(255,255,255,0.8); }
  - selector: '[data-section="section-testimonials"]'
    css: >-
      .landing-section { background: #faf6f1; } .lp-card-hover { background: #fff; border-color: rgba(0,0,0,0.08); }
      .lp-stars { color: #e67e22; }
  - selector: '[data-section="section-cta"]'
    css: '.landing-section { background: linear-gradient(to bottom right, rgba(217,119,87,0.1), rgba(212,162,127,0.05)); }'
  - selector: '[data-section="section-footer"]'
    css: >-
      .landing-section { background: #121212; } h1, h2, h3, h4 { color: #FFFFFF; } p, li, span { color: #A0A0A0; }
      .lp-card-hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); } .glass-card {
      background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: #FFFFFF; } .lp-icon-bg {
      background: rgba(255,255,255,0.1); }
