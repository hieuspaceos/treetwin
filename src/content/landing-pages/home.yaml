title: Tree-id — Landing Pages for Indie Makers
description: Describe your product. Get a professional landing page in 5 minutes. No code, no design skills.
design:
  colors:
    primary: '#c8a97e'
    secondary: '#c8a97e'
    accent: '#c8a97e'
    background: '#0a0a0a'
    surface: '#111111'
    text: '#f0ede8'
    textMuted: 'rgba(240,237,232,0.45)'
  fonts:
    heading: DM Serif Display
    body: DM Sans
  borderRadius: '16px'
sections:
  # --- Nav ---
  - type: nav
    order: -1
    enabled: true
    data:
      brandName: tree.id
      links:
        - label: Features
          href: '#section-features'
        - label: Compare
          href: '#section-comparison'
        - label: Pricing
          href: '#section-pricing'
        - label: FAQ
          href: '#section-faq'
        - label: Sign In
          href: '/auth/login'
      cta:
        text: Sign Up Free
        url: '/auth/login'
      variant: default
      socialLinks: []
    style:
      fullWidth: true
      background: rgba(10,10,10,0.9)
      textColor: '#f0ede8'

  # --- Hero ---
  - type: hero
    order: 0
    enabled: true
    data:
      badge: AI-powered landing pages
      headline: "Describe your product. Get a landing page."
      subheadline: You built something with AI. Now sell it. Tell us what you made — we generate a professional landing page in minutes. No code, no design skills.
      cta:
        - text: Try it free
          url: '#section-ai-search'
          variant: primary
        - text: See how it works
          url: '#section-how-it-works'
          variant: outline
      variant: centered
    style:
      fullWidth: true
      background: '#0a0a0a'
      textColor: '#f0ede8'
      padding: '8rem 2rem 4rem'

  # --- AI Search Input ---
  - type: ai-search
    order: 1
    enabled: true
    data:
      placeholder: "I built an AI tool that turns screenshots into code..."
      thinkingText: Generating your landing page...
      resultsHeader: Your landing page
      hints:
        - label: "🧩 Chrome extension"
          text: "I built a Chrome extension that blocks distractions and tracks focus time"
        - label: "📋 Notion template"
          text: "I made a Notion template for freelancers to track projects and invoices"
        - label: "🎨 Image API"
          text: "I created an API that generates social media images from templates"
        - label: "📱 Mobile app"
          text: "I built a mobile app for habit tracking with AI coaching"
      defaultSuggestions:
        - icon: "🏗️"
          name: Landing Page
          desc: Professional page with hero, features, pricing
          price: Free
          type: instant
        - icon: "✨"
          name: AI-Generated Copy
          desc: Headlines, descriptions, CTAs written for you
          price: Included
          type: built-in
        - icon: "🚀"
          name: Instant Publish
          desc: Live at tree-id.dev/your-slug in minutes
          price: Free
          type: instant
      intents: []
      featureProducts:
        - id: landing
          label: "Landing Page"
          tagline: "Professional product page in 5 minutes"
          demo:
            tabs:
              - label: ClaudeKit
                src: /ck2
              - label: Dark Edition
                src: /ck3
          features:
            - icon: "🎨"
              title: "25+ Section Types"
              desc: "Hero, features, pricing, FAQ, testimonials, comparison tables and more."
            - icon: "🤖"
              title: "AI-Generated Copy"
              desc: "Describe your product. AI writes headlines, descriptions, CTAs."
            - icon: "🔍"
              title: "SEO Auto-Optimized"
              desc: "JSON-LD, Open Graph, meta tags — generated automatically."
            - icon: "⚡"
              title: "Edge-Fast Loading"
              desc: "Under 1 second load time. Built on Astro + edge network."
          comparison:
            competitors: ["Bolt/Lovable", "Carrd", "Framer"]
            rows:
              - label: "You describe → you get"
                values: ["✓ Live landing page", "Code repo", "Blank canvas", "Template"]
              - label: "Time to live"
                values: ["✓ <5 minutes", "30min+ (deploy)", "1-3 hours", "1-2 hours"]
              - label: "SEO"
                values: ["✓ Auto JSON-LD + meta", "✗ SPA, Google struggles", "Basic meta", "Good"]
              - label: "Edit after"
                values: ["✓ Visual editor", "Code (React)", "Drag-drop", "Drag-drop"]
              - label: "AI copy"
                values: ["✓ Built-in", "✓ Built-in", "✗ None", "AI assist"]
              - label: "Technical skill"
                values: ["✓ Type words only", "Read code", "Some design", "Design sense"]
              - label: "Price"
                values: ["Free / $19/mo", "$20/mo", "$19/yr", "$15/mo"]
          faq:
            - q: "How is this different from Carrd?"
              a: "Carrd is a general site builder. tree-id generates a complete landing page from your product description — no drag-and-drop, no template picking."
            - q: "Can I customize the design?"
              a: "Yes. Change colors, fonts, reorder sections, edit all copy. Visual editor, no code."
          cta:
            headline: "Your product deserves customers."
            button: "Build your landing page"
            url: "#section-ai-search"
        - id: blog
          label: "Blog"
          tagline: "Content engine with AI writing"
          demo:
            tabs:
              - label: Articles
                src: /seeds
          features:
            - icon: "✍️"
              title: "AI Voice Writing"
              desc: "Train your writing voice. AI drafts in YOUR style, not generic."
            - icon: "📰"
              title: "Markdoc Articles"
              desc: "Git-tracked markdown. Own your content forever."
            - icon: "🔍"
              title: "SEO Built-In"
              desc: "Auto JSON-LD, meta tags, RSS feed. Findable from day one."
            - icon: "📧"
              title: "Newsletter"
              desc: "Built-in email capture + broadcast via Resend."
          comparison:
            competitors: ["WordPress", "Ghost", "Medium"]
            rows:
              - label: "Setup"
                values: ["✓ 5 minutes", "30min+ (hosting)", "15 minutes", "Instant"]
              - label: "Own content"
                values: ["✓ Git files (yours)", "DB (exportable)", "DB", "✗ Platform-locked"]
              - label: "AI writing"
                values: ["✓ Voice AI built-in", "Plugins ($)", "✗ None", "✗ None"]
              - label: "SEO"
                values: ["✓ Auto JSON-LD", "Plugin-heavy", "Good", "Platform SEO"]
              - label: "Newsletter"
                values: ["✓ Built-in (Resend)", "Plugin", "✓ Built-in", "✗ No"]
              - label: "Cost"
                values: ["Free / $19/mo", "$5-30/mo", "$9/mo", "Free (limited)"]
          faq:
            - q: "Can I migrate from WordPress?"
              a: "Yes. Export your posts as markdown, drop them in. Git-tracked, no database needed."
            - q: "How does AI writing work?"
              a: "Create a voice profile with sample paragraphs. AI drafts new content matching your tone and style."
          cta:
            headline: "Write less. Publish more."
            button: "Start your blog"
            url: "#section-ai-search"
        - id: ai-content
          label: "AI Content"
          tagline: "AI writes in your voice"
          demo:
            tabs:
              - label: Voice Editor
                src: /admin
          features:
            - icon: "🎤"
              title: "Voice Profiles"
              desc: "Define your tone, style, audience. AI learns and matches."
            - icon: "📝"
              title: "Auto-Draft"
              desc: "One topic → full article draft in your voice. Edit and publish."
            - icon: "📊"
              title: "SEO Score"
              desc: "Real-time SEO analysis. Fix issues before publishing."
            - icon: "🌐"
              title: "Multi-Platform Distribution"
              desc: "Generate social posts for Twitter, LinkedIn, Dev.to from one article."
          comparison:
            competitors: ["ChatGPT/Claude", "Jasper", "Copy.ai"]
            rows:
              - label: "Learns your voice"
                values: ["✓ Voice profiles", "✗ Prompt each time", "Templates", "Templates"]
              - label: "Publishes direct"
                values: ["✓ To your site", "✗ Copy-paste", "✗ Copy-paste", "✗ Copy-paste"]
              - label: "SEO optimized"
                values: ["✓ Auto score + fix", "Manual", "Basic", "Basic"]
              - label: "Distribution"
                values: ["✓ Multi-platform", "✗ Manual", "✗ Manual", "Social only"]
              - label: "Price"
                values: ["Included ($19/mo)", "$20/mo", "$49/mo", "$49/mo"]
          faq:
            - q: "Is the AI content any good?"
              a: "It drafts based on your voice profile — tone, word choice, audience. You edit and refine. The AI handles structure, you add personality."
            - q: "Which AI model?"
              a: "Google Gemini for content generation. Quality comparable to GPT-4 at lower cost."
          cta:
            headline: "Content on autopilot."
            button: "Try AI writing"
            url: "#section-ai-search"
        - id: chatbot
          label: "AI Chatbot"
          tagline: "24/7 support trained on your data"
          demo:
            tabs:
              - label: Chat Widget
                src: /ck2
          features:
            - icon: "💬"
              title: "Trained On Your Site"
              desc: "Chatbot learns from your pages, docs, FAQ. Answers accurately."
            - icon: "🔌"
              title: "One-Click Enable"
              desc: "Toggle on in settings. Widget appears on your landing page."
            - icon: "🧠"
              title: "Smart Escalation"
              desc: "Knows when to hand off to a human. Captures contact info."
            - icon: "📈"
              title: "Conversation Analytics"
              desc: "See what visitors ask. Find gaps in your content."
          comparison:
            competitors: ["Intercom", "Crisp", "ChatBot.com"]
            rows:
              - label: "Train on your data"
                values: ["✓ Auto from site", "✓ Docs/URLs", "✓ URLs", "✓ URLs"]
              - label: "Setup"
                values: ["✓ 1 click enable", "Complex", "Moderate", "Moderate"]
              - label: "Integrated with site"
                values: ["✓ Native", "Embed widget", "Embed", "Embed"]
              - label: "AI quality"
                values: ["Gemini/Claude", "GPT-4", "GPT", "GPT"]
              - label: "Price"
                values: ["Usage-based", "$74/mo+", "$25/mo", "$52/mo"]
          faq:
            - q: "Will it answer wrong things?"
              a: "It only answers based on your site content. If unsure, it says so and offers to connect with you."
            - q: "How much does usage-based cost?"
              a: "Pay per conversation. Most small sites spend under $5/month."
          cta:
            headline: "Never miss a customer question."
            button: "Enable chatbot"
            url: "#section-ai-search"
    style:
      fullWidth: true
      background: '#0a0a0a'
      textColor: '#f0ede8'
      padding: '0 2rem 4rem'

  # --- Stats ---
  - type: stats
    order: 2
    enabled: true
    data:
      items:
        - value: "5 min"
          label: To launch
        - value: "$0"
          label: To start
        - value: "25+"
          label: Section types
      variant: inline
    style:
      fullWidth: true
      background: '#0a0a0a'
      textColor: '#f0ede8'
      padding: '2rem 2rem 5rem'

  # --- Product Showcase (dynamic, rendered by client JS based on feature selection) ---
  - type: product-showcase
    order: 2.2
    enabled: true
    data: {}
    style:
      fullWidth: true
      background: '#0a0a0a'
      textColor: '#f0ede8'
      padding: '0 2rem 4rem'

  # --- Live Demo Preview ---
  - type: rich-text
    order: 2.5
    enabled: true
    data:
      content: |
        <div style="text-align:center;margin-bottom:2.5rem">
          <p style="font-size:0.75rem;color:var(--lp-accent);letter-spacing:0.1em;text-transform:uppercase;font-weight:500;margin-bottom:1rem">See it live</p>
          <h2 style="font-family:'DM Serif Display',serif;font-size:clamp(28px,4vw,44px);letter-spacing:-0.02em">This is what you get.</h2>
          <p style="color:var(--lp-text-muted);margin-top:0.5rem;max-width:500px;margin-left:auto;margin-right:auto">Real landing pages built with tree-id. Scroll through, click around — these are live.</p>
        </div>

        <!-- Live iframe preview with tab switcher -->
        <div style="max-width:960px;margin:0 auto">
          <div style="display:flex;gap:0.5rem;margin-bottom:1rem;justify-content:center;flex-wrap:wrap" id="demo-tabs">
            <button onclick="switchDemo('/ck2','demo-frame',this)" style="padding:0.5rem 1.25rem;border-radius:100px;border:1px solid rgba(255,255,255,0.15);background:rgba(200,169,126,0.12);color:#c8a97e;font-size:0.85rem;cursor:pointer;font-family:inherit;font-weight:500" class="demo-tab active">🚀 ClaudeKit</button>
            <button onclick="switchDemo('/ck3','demo-frame',this)" style="padding:0.5rem 1.25rem;border-radius:100px;border:1px solid rgba(255,255,255,0.07);background:transparent;color:rgba(240,237,232,0.45);font-size:0.85rem;cursor:pointer;font-family:inherit" class="demo-tab">⚡ Dark Edition</button>
            <button onclick="switchDemo('/toi-ban-hoa','demo-frame',this)" style="padding:0.5rem 1.25rem;border-radius:100px;border:1px solid rgba(255,255,255,0.07);background:transparent;color:rgba(240,237,232,0.45);font-size:0.85rem;cursor:pointer;font-family:inherit" class="demo-tab">🌸 Flower Shop</button>
          </div>

          <!-- Browser mockup frame -->
          <div style="background:#1a1a1a;border:1px solid rgba(255,255,255,0.1);border-radius:12px;overflow:hidden">
            <div style="display:flex;align-items:center;gap:0.5rem;padding:0.75rem 1rem;border-bottom:1px solid rgba(255,255,255,0.07);background:#111">
              <div style="display:flex;gap:6px">
                <span style="width:12px;height:12px;border-radius:50%;background:#ff5f57"></span>
                <span style="width:12px;height:12px;border-radius:50%;background:#febc2e"></span>
                <span style="width:12px;height:12px;border-radius:50%;background:#28c840"></span>
              </div>
              <div style="flex:1;text-align:center;font-size:0.75rem;color:rgba(240,237,232,0.3);font-family:monospace" id="demo-url">tree-id.dev/ck2</div>
            </div>
            <iframe id="demo-frame" src="/ck2" style="width:100%;height:500px;border:none;background:#0a0a0a" loading="lazy"></iframe>
          </div>

          <p style="text-align:center;margin-top:1rem;font-size:0.8rem;color:var(--lp-text-muted)">
            ↑ This is a real page. Scroll it. Click links. <a href="/ck2" target="_blank" style="color:var(--lp-accent);text-decoration:underline">Open full screen →</a>
          </p>
        </div>

        <script>
          function switchDemo(url, frameId, btn) {
            document.getElementById(frameId).src = url;
            document.getElementById('demo-url').textContent = 'tree-id.dev' + url;
            document.querySelectorAll('.demo-tab').forEach(t => {
              t.style.background = 'transparent';
              t.style.color = 'rgba(240,237,232,0.45)';
              t.style.borderColor = 'rgba(255,255,255,0.07)';
              t.style.fontWeight = '400';
            });
            btn.style.background = 'rgba(200,169,126,0.12)';
            btn.style.color = '#c8a97e';
            btn.style.borderColor = 'rgba(255,255,255,0.15)';
            btn.style.fontWeight = '500';
          }
        </script>
    style:
      fullWidth: true
      background: '#0a0a0a'
      textColor: '#f0ede8'
      padding: '5rem 2rem'

  # --- Admin Editor Demo Video ---
  - type: video
    order: 2.7
    enabled: true
    data:
      heading: Edit everything. See changes instantly.
      subheading: Sections on the left. Live preview on the right. No code needed.
      # Replace with Loom/YouTube URL when ready
      url: /images/demo/tree-id-admin-editor-demo.gif
      variant: inline
    style:
      fullWidth: true
      background: '#111111'
      textColor: '#f0ede8'
      padding: '5rem 2rem'

  # --- How It Works ---
  - type: how-it-works
    order: 3
    enabled: true
    data:
      heading: From idea to live page
      subheading: No templates. No drag-and-drop. Just describe what you built.
      items:
        - number: 1
          title: Describe
          description: Tell us what you built. One sentence is enough. Our AI understands products, APIs, apps, templates — anything you ship.
          icon: "💬"
        - number: 2
          title: Generate
          description: AI creates a full landing page — hero, features, pricing, FAQ, CTA. Professional copy and layout, not generic templates.
          icon: "✨"
        - number: 3
          title: Customize
          description: Edit any section. Change colors, rewrite copy, reorder blocks. Visual editor — no code needed. Sign up to save your work.
          icon: "🎨"
        - number: 4
          title: Publish
          description: Go live instantly at tree-id.dev/your-slug. Mobile responsive, SEO-ready, fast. Start getting users today.
          icon: "🚀"
      variant: numbered
    style:
      fullWidth: true
      background: '#111111'
      textColor: '#f0ede8'
      padding: '5rem 2rem'

  # --- Features ---
  - type: features
    order: 4
    enabled: true
    data:
      heading: Everything you need to launch
      subheading: Built by an indie maker, for indie makers.
      items:
        - icon: "🤖"
          title: AI-Powered Generation
          description: Describe your product in plain English. AI creates copy, picks layouts, suggests sections.
        - icon: "🎨"
          title: 25+ Section Types
          description: Hero, features, pricing, FAQ, testimonials, comparison, gallery, and more. Mix and match.
        - icon: "📱"
          title: Mobile-Ready
          description: Every page looks great on phone, tablet, and desktop. Dark mode included.
        - icon: "🔍"
          title: SEO Built-In
          description: Meta tags, Open Graph, JSON-LD — auto-generated. Findable from day one.
        - icon: "⚡"
          title: Edge-Fast
          description: Pages load in under 1 second. Built on Astro + edge network.
        - icon: "🔄"
          title: Iterate Fast
          description: Regenerate sections, test headlines, add blocks. Your page grows with your product.
      columns: 3
      variant: bento
    style:
      fullWidth: true
      background: '#0a0a0a'
      textColor: '#f0ede8'
      padding: '5rem 2rem'

  # --- Comparison ---
  - type: comparison
    order: 5
    enabled: true
    data:
      heading: Honest comparison
      subheading: Why indie makers choose tree-id
      columns:
        - label: Tree-id
        - label: Bolt / Lovable
        - label: Carrd / Framer
      rows:
        - label: You describe → you get
          values:
            - "✓ Live landing page"
            - "A codebase to deploy"
            - "✗ A blank canvas"
          highlight: true
        - label: Time to first visitor
          values:
            - "✓ Under 5 minutes"
            - "30min+ (need to deploy)"
            - "1–3 hours (build from scratch)"
          highlight: true
        - label: Google finds your page
          values:
            - "✓ SEO + JSON-LD auto"
            - "✗ SPA — Google struggles"
            - "Basic meta only"
          highlight: true
        - label: Change headline later
          values:
            - "✓ Click and edit"
            - "Open code, find file, edit"
            - "Open builder, find block"
          highlight: true
        - label: Technical skill required
          values:
            - "✓ Can you type? That's enough"
            - "Read React / Next.js code"
            - "Design sense + builder UX"
          highlight: true
        - label: What you pay
          values:
            - "✓ $0 to start, $19/mo Pro"
            - "$20/mo + hosting cost"
            - "$15/mo Framer / $19/yr Carrd"
          highlight: true
    style:
      fullWidth: true
      background: '#111111'
      textColor: '#f0ede8'
      padding: '5rem 2rem'

  # --- Pricing ---
  - type: pricing
    order: 6
    enabled: true
    data:
      heading: Simple pricing. Start free.
      subheading: No credit card required. Upgrade when you need more.
      plans:
        - name: Free
          price: "$0"
          period: "/month"
          description: Perfect for your first launch.
          features:
            - 1 landing page
            - 3 AI generates/month
            - Live at tree-id.dev/your-slug
            - All 25+ section types
            - Mobile responsive
            - SEO auto-generated
          cta:
            text: Start Free
            url: '/auth/login'
        - name: Pro
          price: "$19"
          period: "/month"
          description: For makers with multiple projects.
          badge: Popular
          features:
            - Unlimited landing pages
            - Unlimited AI generates
            - Custom domain (coming soon)
            - No tree-id branding
            - Priority support
            - Analytics dashboard
          cta:
            text: Get Pro
            url: '/auth/login'
          highlighted: true
      variant: cards
    style:
      fullWidth: true
      background: '#0a0a0a'
      textColor: '#f0ede8'
      padding: '5rem 2rem'

  # --- FAQ ---
  - type: faq
    order: 7
    enabled: true
    data:
      heading: Questions?
      items:
        - question: How is this different from Carrd or Framer?
          answer: Carrd and Framer are general website builders. tree-id is purpose-built for product landing pages. You describe your product — AI generates a complete page. No drag-and-drop, no template hunting.
        - question: What AI model do you use?
          answer: We use Google's Gemini API to generate landing page copy and suggest sections. You can edit everything after — the AI is a starting point, not a lock-in.
        - question: Can I use my own domain?
          answer: Custom domain support is on the roadmap for Pro plan. For now, your page lives at tree-id.dev/your-slug — perfectly fine for a first launch.
        - question: Do I need to sign up to try?
          answer: No! Enter your product description on the homepage and we'll generate a landing page instantly. You only need to sign up when you want to save, customize, or publish.
        - question: Is there really a free plan?
          answer: Yes. 1 landing page, 3 AI generates per month. Enough to launch one product. Upgrade to Pro ($19/mo) for unlimited.
        - question: Who built this?
          answer: An indie maker who got tired of spending days on landing pages instead of shipping products. The whole stack costs almost nothing to run — we pass those savings to you.
      variant: accordion
    style:
      fullWidth: true
      background: '#111111'
      textColor: '#f0ede8'
      padding: '5rem 2rem'

  # --- CTA ---
  - type: cta
    order: 8
    enabled: true
    data:
      headline: Your product deserves customers.
      subheadline: Stop procrastinating on your landing page. Describe what you built. Launch today. Get your first users this week.
      cta:
        text: Try it now — free
        url: '#section-ai-search'
      variant: banner
    style:
      fullWidth: true
      background: 'linear-gradient(135deg, rgba(200,169,126,0.15) 0%, rgba(200,169,126,0.05) 100%)'
      textColor: '#f0ede8'
      accentColor: '#c8a97e'
      padding: '5rem 2rem'

  # --- Footer ---
  - type: footer
    order: 9
    enabled: true
    data:
      text: "© 2026 tree-id · Built for builders"
      links:
        - label: Articles
          href: /seeds
        - label: About
          href: /about
      variant: simple
      socialLinks: []
    style:
      fullWidth: true
      background: '#0a0a0a'
      textColor: 'rgba(240,237,232,0.25)'
