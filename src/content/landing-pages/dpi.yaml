  - type: faq
    order: 13
    enabled: true
    data:
      heading: Câu hỏi thường gặp
      subheading: Tò mò về DPI MEDIA? Đây là các thắc mắc phổ biến. Nếu cần thêm, cứ nhắn cho chúng tôi.
      items:
        - question: DPI?
          answer: >-
            DPI = Digital Performance & Innovation. Digital – Số hóa: Đại diện cho lĩnh vực truyền thông, sản xuất nội
            dung số (media, video, ảnh, quảng cáo...). Performance – Hiệu quả: Cam kết tạo ra sản phẩm đạt chất lượng và
            hiệu quả truyền thông cao nhất cho khách hàng. Innovation – Đổi mới: Tư duy sáng tạo, liên tục cập nhật xu
            hướng, công nghệ và giải pháp mới trong ngành
        - question: DPI MEDIA cung cấp những dịch vụ nào?
          answer: >-
            Chúng tôi sản xuất TVC, social video, 3D/Animation, VFX, livestream sự kiện, OOH và trọn gói từ tiền kỳ—hậu
            kỳ.
        - question: Chi phí sản xuất video bao nhiêu?
          answer: >-
            Tùy độ dài, độ phức tạp và yêu cầu (diễn viên, bối cảnh, VFX…). Hãy gửi yêu cầu ở trang Báo giá để nhận đề
            xuất & khung chi phí phù hợp.
        - question: Thời gian thực hiện một dự án?
          answer: Dự án ngắn 1–2 tuần; TVC/3D phức tạp 3–6 tuần. Chúng tôi luôn gửi lịch trình sản xuất rõ ràng ngay từ đầu.
        - question: DPI có hỗ trợ kịch bản & storyboard không?
          answer: >-
            Có Creative team hỗ trợ strategy, kịch bản, storyboard/moodboard để thống nhất hình ảnh và thông điệp trước
            khi quay/dựng.
        - question: Quy trình làm việc của DPI như thế nào?
          answer: >-
            Brief → đề xuất & báo giá → kịch bản/board → tiền kỳ (casting, bối cảnh) → sản xuất → hậu kỳ (edit, color,
            VFX, âm thanh) → bàn giao.
        - question: Có thể làm trong ngân sách cố định không?
          answer: Chúng tôi tối ưu nguồn lực theo ngân sách, nhưng vẫn giữ tiêu chuẩn chất lượng & đúng deadline.
      variant: accordion
  - type: contact-form
    order: 14
    enabled: true
    data:
      heading: Đặt lịch quay / sản xuất nội dung cùng DPI MEDIA
      subheading: >-
        Cho chúng tôi biết cách liên lạc và loại nội dung bạn đang cần. Đội ngũ tư vấn sẽ phản hồi trong vòng **24 giờ
        làm việc**. Dù bạn đang chuẩn bị TVC, video doanh nghiệp, social clip hay nội dung hậu trường, chúng tôi luôn
        bắt đầu bằng việc hiểu rõ: Mục tiêu chiến dịch & đối tượng khán giả. Giọng nói thương hiệu & bối cảnh sử dụng
