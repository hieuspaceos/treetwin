  - type: rich-text
    order: 5
    enabled: true
    data:
      content: >-
        ## Hành trình dự án DPI MEDIA

        Quy trình đằng sau những thước phim chất lượng. Cách DPI Media giải quyết bài toán thương hiệu cho từng đối tác.


        [![DPI x CỬA NHỰA COMPOSITE ASIA
        DOOR](https://api.dpistudio.vn/uploads/news/1768291780145_asiadoor.jpg)](https://dpistudio.vn/du-an/dpi-x-cua-nhua-composite-asia-door)

        Social Media • 13/01/2026

        **DPI x CỬA NHỰA COMPOSITE ASIA DOOR** 

        DPI đồng hành cùng Asia Door với vai trò đối tác Marketing đa nền tảng, tập trung xây dựng chiến lược nội dung
        bài bản và định hình hình ảnh thương hiệu nhất quán trên các kênh số. Thông qua nghiên cứu thị trường, triển
        khai nội dung sáng tạo và tối ưu hiệu quả truyền thông, DPI góp phần giúp Asia Door làm nổi bật giá trị cốt lõi
        của cửa nhựa composite, tạo nền tảng vững chắc cho mục tiêu mở rộng thị phần và khẳng định vị thế thương hiệu
        trên thị trường.


        [![DPI x GIẢI BÓNG ĐÁ DOANH NGHIỆP CHUNG TAY VÌ MIỀN TRUNG
        2025](https://api.dpistudio.vn/uploads/news/1768212549015_GBDDNCTMT2025.jpg)](https://dpistudio.vn/du-an/dpi-x-giai-bong-a-doanh-nghiep-chung-tay-vi-mien-trung-2025)

        Event • 12/01/2026

        **DPI x GIẢI BÓNG ĐÁ DOANH NGHIỆP CHUNG TAY VÌ MIỀN TRUNG 2025** 

        DPI MEDIA đồng hành cùng Giải bóng đá Doanh nghiệp “Chung tay vì miền Trung” với vai trò đơn vị tổ chức và triển
        khai truyền thông toàn diện, góp phần tạo nên một giải đấu chuyên nghiệp, giàu cảm xúc và đậm tinh thần sẻ chia.
        Không chỉ là sân chơi thể thao gắn kết cộng đồng doanh nghiệp, giải đấu còn lan tỏa mạnh mẽ thông điệp trách
        nhiệm xã hội, kêu gọi sự chung tay vì miền Trung.


        [![DPI x HYUNDAI SMART
        HOME](https://api.dpistudio.vn/uploads/news/1773218095092_1763364375258-HYUNDAI.jpg)](https://dpistudio.vn/du-an/dpi-x-hyundai-smart-home)

        Social Media • 11/03/2026

        **DPI x HYUNDAI SMART HOME** 

        Trải nghiệm khóa nội thất thông minh Hyundai Smart Home qua ống kính của DPI Media. Giải pháp Video Ads sáng
        tạo, chân thực, giúp doanh nghiệp gia tăng niềm tin với đại lý và khách hàng.


        [![DPI x CÔNG TY CP NÔNG NGHIỆP VIỆT NAM
        SYMBIO](https://api.dpistudio.vn/uploads/news/1773196450102_z7608395951251_dca2ae99f7300718a123934b1f3e0e0c.jpg)](https://dpistudio.vn/du-an/dpi-x-cong-ty-cp-nong-nghiep-viet-nam-symbio)

        Social Media • 11/03/2026

        **DPI x CÔNG TY CP NÔNG NGHIỆP VIỆT NAM SYMBIO** 

        Nâng tầm thương hiệu phân bón Symbio bằng hình ảnh & video chất lượng cao từ DPI Media. Xem ngay cách chúng tôi
        truyền tải giá trị nông nghiệp xanh qua ống kính chuyên nghiệp!


        [Xem toàn bộ dự án](https://dpistudio.vn/du-an)
