      heading: Vos conseillers de voyage
      subheading: >-
        Nos conseillers de voyage au Vietnam, à l’écoute, toujours disponibles, vous aideront à avoir un voyage de
        qualité et mémorable.
      members:
        - name: CUC NGUYEN
          role: Experte des croisières Mékong
          photo: https://aucoeurvietnam.com/wp-content/uploads/2023/12/conseiller-de-voyage-cuc-nguyen-1.jpeg
          bio: >-
            Je me suis profondément attachée aux régions et aux cultures variées du Vietnam et du Cambodge. Les plages
            exotiques, le delta du Mékong paisible, les marchés flottants…
        - name: QUEEN-ANNE
          role: Expert Laos et Nord Vietnam
          photo: https://aucoeurvietnam.com/wp-content/uploads/2024/01/conseillere-de-voyage-au-Vietnam-Quynh-Anh.jpg
          bio: >-
            Avec plus de dix ans d’expérience en tant que guide touristique au Laos et dans le Nord du Vietnam, je me
            suis spécialisée dans la création d’expériences immersives en pleine nature.
        - name: TRAM NGUYEN
          role: Experte des voyages combinés
          photo: https://aucoeurvietnam.com/wp-content/uploads/2023/12/conseiller-de-voyage-tram-nguyen-1.jpg
          bio: >-
            La curiosité que j’ai pour mon pays n’a cessé de grandir au fil de découvertes. J’adore parcourir le Vietnam
            et immortaliser la beauté de ses paysages, de ses locaux avec mon appareil photo.
        - name: DARTIS HOANG
          role: Expert des voyages au Vietnam
          photo: https://aucoeurvietnam.com/wp-content/uploads/2025/05/dartis-conseiller-de-voyage-aucoeurvietnam.jpg
          bio: >-
            Avec son histoire millénaire et sa culture vibrante, le Vietnam suscite en moi une passion pour le domaine
            du tourisme. En tant que conseiller dynamique, je serais ravi de vous faire découvrir l’enchantement du
            Vietnam
        - name: LAETITIA TRAN
          role: Experte des voyages culturels
          photo: https://aucoeurvietnam.com/wp-content/uploads/2025/07/laetitia-conseillere.jpg
          bio: >-
            J’aime découvrir l’histoire et la culture de mon pays. C’est pour cet amour que je m’engage dans le tourisme
            pour vous apporter un Vietnam avec toutes ses beautés charmante et ses valeurs variées.
      cta:
        text: Voir notre équipe
        url: https://aucoeurvietnam.com/vos-conseillers-de-voyage-locaux/
